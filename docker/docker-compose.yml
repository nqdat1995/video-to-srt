version: '3.8'

volumes:
  exchange_data:
    driver: local
    driver_opts:
      type: none
      device: /run/desktop/mnt/host/d/LEARN/n8n/exchange_data
      o: bind,uid=1000,gid=1000,rw
  postgres_data:
    driver: local

services:
  # PostgreSQL database for video metadata
  postgres:
    image: postgres:16-alpine
    container_name: video-to-srt-db
    environment:
      POSTGRES_DB: video_srt_db
      POSTGRES_USER: video_user
      POSTGRES_PASSWORD: video_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - video-to-srt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_user -d video_srt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CPU-only service (default)
  video-to-srt:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - video-to-srt:latest
    image: video-to-srt:latest
    container_name: video-to-srt
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # # Mount uploads directory for video files
      # - ./uploads:/app/uploads
      # # Mount cache directory for OCR models
      # - ./cache:/app/cache
      # # Mount logs directory
      # - ./logs:/app/logs
      # # Optional: Mount .env file (read-only)
      # - ./.env:/app/.env:ro
      - exchange_data:/exchange_data
    environment:
      # Server settings
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
      # Database settings
      - DATABASE_URL=postgresql://video_user:video_password@postgres:5432/video_srt_db
      - MAX_VIDEOS_PER_USER=10
      - UPLOAD_DIR=/app/uploads
      # OCR settings
      - DEFAULT_DEVICE=cpu
      - DEFAULT_LANG=ch
      - DEFAULT_TARGET_FPS=10
      - OCR_CACHE_MAX=4
      - BATCH_OCR_SIZE=8
      # Logging
      - LOG_LEVEL=ERROR
      # PaddleOCR fixes
      - FLAGS_use_mkldnn=0
      - TF_CPP_MIN_LOG_LEVEL=2
      - PYTHONWARNINGS=ignore
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - video-to-srt-network
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '1.0'
    #       memory: 1G

  # GPU-enabled service (requires nvidia-docker and NVIDIA GPU)
  # video-to-srt-gpu:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.gpu
  #     cache_from:
  #       - video-to-srt:gpu
  #   image: video-to-srt:gpu
  #   container_name: video-to-srt-gpu
  #   ports:
  #     - "8001:8000"
